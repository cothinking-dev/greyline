# Default configuration for greyline.
# User config at ~/.config/greyline/config.toml is merged over this
# (top-level keys override; a user [[city]] list replaces this one entirely).

backend = "auto"            # auto | sway | swww | hyprpaper | x11 (feh/xwallpaper) | command

# GNOME / KDE / XFCE and other desktops: use backend = "command" and give a shell
# command that sets the wallpaper to the PNG greyline renders. {path} is the PNG,
# {output} the output name. This REPLACES the wallpaper (it is not an overlay).
# See the README "Desktop environments" recipes. Examples:
#   command = 'gsettings set org.gnome.desktop.background picture-uri "" && gsettings set org.gnome.desktop.background picture-uri "file://{path}" && gsettings set org.gnome.desktop.background picture-uri-dark "file://{path}"'  # GNOME
#   command = 'plasma-apply-wallpaperimage {path}'                                                                        # KDE Plasma
#   command = 'xfconf-query -c xfce4-desktop -p /backdrop/screen0/monitor0/workspace0/last-image -s {path}'               # XFCE
# resolution = "2560x1440"   # optional; size of the single rendered image (else largest xrandr output, else 1920x1080)
map_style = "vector"        # vector (scalable, themeable) | raster (needs your own map art, see NOTICE)
theme = "dark"              # dark | blue
format = "24h"              # 24h | 12h
logo = true                 # draw the bottom-left corner logo (bundled default: Tux)
# logo_path = "/path/to/your/logo.png"   # swap in your own logo (PNG with transparency)
# logo_invert = false        # recolour a dark logo's near-black pixels to light (for dark logos)
# logo_scale = 1.0           # size the corner logo (e.g. 0.5 = half; square logos like Tux read large)
bar_height = 0              # px reserved at the bottom for a status bar (lifts the logo)

[twilight]
bands = true               # discrete civil/nautical/astronomical bands
darkness = "subtle"        # subtle | medium | dramatic

[home]
tz = "auto"                # "auto" = system timezone, or e.g. "Asia/Kuala_Lumpur"
column_highlight = true

# Each [[city]] takes name/lat/lon/tz. Optional: label_side ("left"/"right"/"above"/
# "below") nudges that city's label to the chosen side of its dot (it still falls back to
# avoid overlapping or running off-screen).
[[city]]
name = "San Francisco"
lat = 37.77
lon = -122.42
tz = "America/Los_Angeles"

